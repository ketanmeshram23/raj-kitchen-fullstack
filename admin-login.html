<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login — Raj's Kitchen</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: #0f172a;
      --accent: #d97706;
      --accent-hover: #b45309;
      --border: #e2e8f0;
      --text: #1e293b;
      --text-light: #64748b;
      --bg: #f8fafc;
      --white: #ffffff;
      --danger: #dc2626;
      --success: #16a34a;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .login-card {
      background: var(--white);
      border-radius: 1rem;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.1);
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 420px;
    }

    .login-logo {
      text-align: center;
      margin-bottom: 2rem;
    }

    .login-logo .logo-circle {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--primary));
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 0.75rem;
      overflow: hidden;
    }

    .login-logo .logo-circle img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .login-logo h1 {
      font-size: 1.5rem;
      color: var(--primary);
      font-weight: 700;
    }

    .login-logo p {
      color: var(--text-light);
      font-size: 0.9rem;
      margin-top: 0.25rem;
    }

    .form-group {
      margin-bottom: 1.25rem;
    }

    label {
      display: block;
      font-size: 0.875rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 0.4rem;
    }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 0.7rem 1rem;
      border: 1.5px solid var(--border);
      border-radius: 0.5rem;
      font-size: 1rem;
      color: var(--text);
      background: var(--white);
      transition: border-color 0.2s;
      outline: none;
    }

    input[type="text"]:focus,
    input[type="password"]:focus {
      border-color: var(--accent);
    }

    .btn-login {
      width: 100%;
      padding: 0.8rem;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 0.5rem;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s;
      margin-top: 0.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }

    .btn-login:hover:not(:disabled) { background: var(--accent-hover); }
    .btn-login:disabled { opacity: 0.65; cursor: not-allowed; }

    .alert {
      padding: 0.75rem 1rem;
      border-radius: 0.5rem;
      font-size: 0.9rem;
      margin-bottom: 1rem;
      display: none;
    }

    .alert.error { background: #fef2f2; color: var(--danger); border: 1px solid #fecaca; display: block; }
    .alert.success { background: #f0fdf4; color: var(--success); border: 1px solid #bbf7d0; display: block; }

    .back-link {
      display: block;
      text-align: center;
      margin-top: 1.5rem;
      color: var(--text-light);
      font-size: 0.875rem;
      text-decoration: none;
    }

    .back-link:hover { color: var(--accent); }

    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div class="login-card">
  <div class="login-logo">
    <div class="logo-circle">
      <img src="img.png" alt="Raj Kitchen Logo" onerror="this.style.display='none'">
    </div>
    <h1>Raj's Kitchen</h1>
    <p>Admin Panel — Secure Login</p>
  </div>

  <div class="alert" id="alertBox"></div>

  <div class="form-group">
    <label for="username">Username</label>
    <input type="text" id="username" placeholder="Enter admin username" autocomplete="username" />
  </div>

  <div class="form-group">
    <label for="password">Password</label>
    <input type="password" id="password" placeholder="Enter password" autocomplete="current-password" />
  </div>

  <button class="btn-login" id="loginBtn" onclick="handleLogin()">
    <span class="spinner" id="spinner"></span>
    <span id="btnText">Login to Dashboard</span>
  </button>

  <a href="/" class="back-link">← Back to Raj's Kitchen</a>
</div>

<script>
  const API_BASE = window.location.origin;

  // Redirect if already logged in
  const existingToken = localStorage.getItem('rk_admin_token');
  if (existingToken) {
    fetch(`${API_BASE}/admin/verify`, {
      headers: { Authorization: `Bearer ${existingToken}` }
    }).then(r => r.json()).then(data => {
      if (data.success) window.location.href = '/admin-dashboard';
    }).catch(() => {});
  }

  // Allow Enter key to submit
  document.getElementById('password').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') handleLogin();
  });
  document.getElementById('username').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') handleLogin();
  });

  function showAlert(message, type) {
    const box = document.getElementById('alertBox');
    box.textContent = message;
    box.className = `alert ${type}`;
  }

  function setLoading(loading) {
    const btn = document.getElementById('loginBtn');
    const spinner = document.getElementById('spinner');
    const btnText = document.getElementById('btnText');
    btn.disabled = loading;
    spinner.style.display = loading ? 'block' : 'none';
    btnText.textContent = loading ? 'Logging in...' : 'Login to Dashboard';
  }

  async function handleLogin() {
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;

    if (!username || !password) {
      showAlert('Please enter both username and password.', 'error');
      return;
    }

    setLoading(true);

    try {
      const res = await fetch(`${API_BASE}/admin/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password }),
      });

      const data = await res.json();

      if (data.success) {
        localStorage.setItem('rk_admin_token', data.token);
        localStorage.setItem('rk_admin_user', JSON.stringify(data.admin));
        showAlert('Login successful! Redirecting...', 'success');
        setTimeout(() => { window.location.href = '/admin-dashboard'; }, 800);
      } else {
        showAlert(data.message || 'Invalid credentials.', 'error');
        setLoading(false);
      }
    } catch (err) {
      showAlert('Cannot reach server. Is it running?', 'error');
      setLoading(false);
    }
  }
</script>

</body>
</html>
